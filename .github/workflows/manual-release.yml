name: Manual Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to release
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      prerelease:
        description: Mark the GitHub release as prerelease
        required: true
        type: boolean
        default: false
      release_notes:
        description: Optional release notes
        required: false
        type: string

permissions:
  actions: write
  contents: write

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next semantic version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [[ -z "$latest_tag" ]]; then
            latest_tag="v0.0.0"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          case "${{ inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump: ${{ inputs.bump }}" >&2
              exit 1
              ;;
          esac

          next="v${major}.${minor}.${patch}"
          if git rev-parse "$next" >/dev/null 2>&1; then
            echo "Tag $next already exists" >&2
            exit 1
          fi

          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "version=${next#v}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          LATEST_TAG: ${{ steps.version.outputs.latest_tag }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        shell: bash
        run: |
          set -euo pipefail

          notes_file="release-notes.md"
          if [[ -n "$RELEASE_NOTES" ]]; then
            printf '%s\n' "$RELEASE_NOTES" > "$notes_file"
          else
            {
              echo "Release $TAG"
              echo
              if [[ "$LATEST_TAG" == "v0.0.0" ]]; then
                echo "Initial release."
              else
                echo "Changes since $LATEST_TAG:"
                git log --pretty='- %s' "$LATEST_TAG"..HEAD
              fi
            } > "$notes_file"
          fi

          prerelease_flag=()
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            prerelease_flag=(--prerelease)
          fi

          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes-file "$notes_file" \
            "${prerelease_flag[@]}"

          echo "Created release $TAG for app version $VERSION"

      - name: Dispatch APK build workflow
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: gh workflow run release-apk.yml --ref "$GITHUB_REF_NAME" -f tag="$TAG"
